<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign-up</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="/static/js/auth.js" defer></script>
    </head>
    <body class="bg-gray-500 h-screen flex justify-center items-center p-10">
        <div class="flex flex-col justify-center bg-white rounded-xl shadow-xl  w-full p-6 md:w-1/2 lg:w-1/4">
            <form action="/register" method="POST" class="flex flex-col space-y-4">
                <label for="name">Enter Your Name</label>
                <input type="name" id="name" name="name" class="border-2"/>

                <label for="email">Enter Your Email</label>
                <input type="email" id="email" name="email" class="border-2"/>
                <div id="error" style="color:red;"></div>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="border-2"/>

                <label for="password">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmpassword" class="border-2" oninput="checkPassword()"/>
                <span id="error" class="text-red-500 text-sm"></span>
                
                <div class="text-center"><button type="submit" class="text-center bg-gray-400 border-2 shadow-2xl p-2 rounded-xl transition transform hover:scale-105">Register</button>
                </div>
                
                <a href="/login" class="text-gray-600 text-center hover:underline transition transform hover:scale-105">Back to login</p>
            </form>
        </div>
        
    </body>
</html>
